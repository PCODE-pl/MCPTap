mcp_command: /home/user/.venvs/llm-council/bin/llm-council
mcp_args: []
mcp_env: {}
mcp_cwd: null
mappings:
  - expose_as: strong_expert
    mcp_tool: consult_council
    override:
      description: |
        # Strong Expert
        Asks the strong expert LLM a question and returns response.

        1. Use `strong_expert` tool when you are planning - ALWAYS reconcile your plans
        with the `strong_expert` tool.

        2. Also use `strong_expert` tool when you are unsure, need a second opinion, review,
        decision support, ranking, or deeper reasoning.

        3. Also as much as possible call `get_goal` tool and check if you spent
        relatively more of the goal (tokens) than current progress on the task
        and (if you did spend more) use `strong_expert` tool - because you are
        doing poor work.

        4. Also use `strong_expert` tool when (for example) the tests are failing second time,
        after your correction, or you don't know what file to edit,
        or you are doing large refactor.

        5. Also use `strong_expert` tool when you finished your work and provide to the
        `strong_expert` tool a summary of your work along with the question
        "Investigate whether this is done correctly".

        6. Require expert response to be concise and to the point.

        7. Include only relevant context/instructions/details/traces in the query.
      parameters:
        type: object
        properties:
          query:
            type: string
            description: The question to ask the strong expert.
        required:
          - query
        additionalProperties: false
      strict: false

  - expose_as: strong_expert_health_check
    mcp_tool: council_health_check
    override:
      description: |
        # Strong Expert Health Check
        Checks the strong expert LLM health.
      parameters:
        type: object
        properties: {}
        required: []
        additionalProperties: false
      strict: false
